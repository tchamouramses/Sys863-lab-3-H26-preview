{% extends "base.html" %}
{% block title %}<span data-fr="Connexion" data-en="Sign in">Connexion</span>{% endblock %}
{% block content %}
<div class="min-h-[calc(100vh-60px)] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <div class="glass rounded-2xl p-8 shadow-2xl">
      <div class="mb-6 text-center">
        <div class="w-12 h-12 rounded-2xl bg-green-600/70 flex items-center justify-center mx-auto mb-3">
          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
          </svg>
        </div>
        <h1 class="font-display font-bold text-2xl text-white" data-fr="Connexion" data-en="Sign in">Connexion</h1>
        <p class="text-white/50 text-sm mt-1" data-fr="Accédez à vos prédictions" data-en="Access your predictions">Accédez à vos prédictions</p>
      </div>

      <form method="POST" action="{{ url_for('auth.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-white/70 mb-1" data-fr="Adresse email" data-en="Email address">Adresse email</label>
          <input type="email" name="email" class="inp" placeholder="vous@exemple.com"
            data-placeholder-fr="vous@exemple.com" data-placeholder-en="you@example.com"
            required autocomplete="email" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-white/70 mb-1" data-fr="Mot de passe" data-en="Password">Mot de passe</label>
          <input type="password" name="password" class="inp" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <div class="flex items-center justify-between text-xs text-white/50">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="remember" class="accent-green-500" />
            <span data-fr="Se souvenir de moi" data-en="Remember me">Se souvenir de moi</span>
          </label>
        </div>
        <button type="submit"
          class="w-full bg-green-600 hover:bg-green-700 active:scale-[.99] text-white font-semibold text-sm rounded-xl py-3 transition-all mt-2"
          data-fr="Se connecter" data-en="Sign in">
          Se connecter
        </button>
      </form>

      <p class="text-center text-xs text-white/40 mt-6">
        <span data-fr="Pas encore de compte ?" data-en="No account yet?">Pas encore de compte ?</span>
        <a href="{{ url_for('auth.register') }}" class="text-green-400 hover:text-green-300 font-semibold"
           data-fr="Créer un compte" data-en="Create account">Créer un compte</a>
      </p>
    </div>

    <p class="text-center text-xs text-white/25 mt-4" data-fr="5 prédictions gratuites à l'inscription" data-en="5 free predictions upon registration">5 prédictions gratuites à l'inscription</p>
  </div>
</div>
{% endblock %}

services:
  web:
    container_name: lab3_web
    build: .
    ports:
      - "5101:5000"
    volumes:
      - app_data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-change-me-in-production}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_PRICE_ID_SUBSCRIPTION=${STRIPE_PRICE_ID_SUBSCRIPTION:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - DOMAIN=${DOMAIN:-http://localhost:5101}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/app.db}
volumes:
  app_data: